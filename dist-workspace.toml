[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# release.yml has repo-specific private Git auth for the external Gaze dependency.
allow-dirty = ["ci"]
# Do not run release artifact validation on pull requests.
pr-run-mode = "skip"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax).
# Keep this Apple Silicon-only until docs/cross-platform-roadmap.md CI proof passes.
targets = ["aarch64-apple-darwin"]

[dist.binaries]
"aarch64-apple-darwin" = ["gaze-lens"]

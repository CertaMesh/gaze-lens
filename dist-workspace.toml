[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# release.yml has repo-specific checkout steps for the external Gaze path dependency.
allow-dirty = ["ci"]
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

[dist.binaries]
"aarch64-apple-darwin" = ["gaze-lens"]
"x86_64-apple-darwin" = ["gaze-lens"]
"x86_64-unknown-linux-gnu" = ["gaze-lens"]
"x86_64-pc-windows-msvc" = ["gaze-lens"]

[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# release.yml is generated by cargo-dist; allow CI workflow drift between dist regenerations.
allow-dirty = ["ci"]
# Do not run release artifact validation on pull requests.
pr-run-mode = "skip"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax).
# Linux targets are CI-proven in .github/workflows/ci.yml before release automation publishes them.
targets = ["aarch64-apple-darwin", "x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]

[dist.github-custom-runners]
x86_64-unknown-linux-gnu = "ubuntu-latest"
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"

[dist.dependencies.apt]
pkg-config = "*"
libdbus-1-dev = "*"

[dist.binaries]
"aarch64-apple-darwin" = ["gaze-lens"]
"x86_64-unknown-linux-gnu" = ["gaze-lens"]
"aarch64-unknown-linux-gnu" = ["gaze-lens"]
